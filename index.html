<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="js/index.js" defer></script>
    <script src="https://kit.fontawesome.com/ae7ff15837.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">
                <img class="nav-logo" src="public/favicoin.svg" alt="Logo Pokédex">
            </a>
            <ul>
                <li><a href="index.html">Découvrir les Pokémons</a></li>
                <li><a href="Mon-équipe.html">Mon équipe</a></li>
            </ul>
            <div class="search-bar">
                <input id="search" type="text" placeholder="Rechercher...">
                <button>
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </nav>
    </header>
    <main>
        <section class="pokemon-list">
            <div class="pokemon-list-header">
                <div class="pokemon-list-title">
                    <h1>Découvrir les Pokémon</h1>
                    <p>Triage par région et par type, puis clique sur détail pour voir les informations du Pokémon.</p>
                </div>
                <div class="pokemon-list-filters">
                    <div class="filter-group">
                        <label for="region">Région</label>
                        <select name="region" id="region">
                            <option value="">Toutes</option>
                            <option value="kanto">Kanto</option>
                            <option value="johto">Johto</option>
                            <option value="hoenn">Hoenn</option>
                            <option value="sinnoh">Sinnoh</option>
                            <option value="teselia">Teselia</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="type">Type</label>
                        <select name="type" id="type">
                            <option value="">Tous</option>
                            <option value="normal">Normal</option>
                            <option value="fire">Feu</option>
                            <option value="water">Eau</option>
                            <option value="grass">Plante</option>
                            <option value="electric">Electrik</option>
                            <option value="ice">Glace</option>
                            <option value="fighting">Combat</option>
                            <option value="poison">Poison</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="pokemon-grid">
            </div>
            <div class="load-more-wrapper">
                <button id="load-more" type="button">Charger plus</button>
            </div>
        </section>
    </main>
    <footer>
        <a href="index.html">
            <img class="footer-logo" src="public/favicoin.svg" alt="Logo Pokédex">
        </a>
        <a href="https://www.linkedin.com/in/enzo-spencer-bb1065372/">
            <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/enzolevieilsspencer-commits/ECF-POK-MON.git">
            <i class="fab fa-github"></i>
        </a>
        <p class="ECF-FRONT-END">
            ECF - FRONT-END
        </p>
        <p class="copyright">© Site créé par Enzo Levieils-Spencer</p>
    </footer>
    
</body>
</html>
