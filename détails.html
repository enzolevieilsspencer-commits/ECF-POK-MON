
<!DOCTYPE html>
<html lang="fr" data-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pokédex</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://kit.fontawesome.com/ae7ff15837.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <nav>
                <a href="index.html"> 
                    <i class="fas fa-arrow-left"></i>
                    <p>Retour à la liste</p>
                </a>
            <ul>
                <li><a href="index.html">Découvrir les Pokémons</a></li>
                <li><a href="Mon-équipe.html">Mon équipe</a></li>
            </ul>
            <div class="search-bar">
                <input type="text" placeholder="Rechercher...">
                <button>
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </nav>
    </nav>
    </header>

    <main class="container">
      <section class="detailSection" aria-labelledby="detailTitle">
        <div class="detailTop">
          <div class="detailMedia">
            <img id="pokemonSprite" class="pokemonSprite" alt="Sprite du Pokémon" />
          </div>

          <div class="detailInfo">
            <h1 id="detailTitle" class="detailTitle">Chargement…</h1>
            <p id="detailId" class="pokemonMeta"></p>

            <div id="detailTypes" class="typeBadges" aria-label="Types"></div>

            <div class="detailActions">
              <button id="teamBtn" class="btn btnPrimary" type="button">
                <i class="fa-solid fa-star" aria-hidden="true"></i>
                <span>Ajouter à mon équipe</span>
              </button>
              <span id="teamHint" class="muted"></span>
            </div>
          </div>
        </div>

        <div class="detailGrid">
          <div class="panel">
            <h2 class="panelTitle">Statistiques</h2>
            <div id="stats" class="statsGrid" role="table" aria-label="Statistiques du Pokémon"></div>
          </div>

          <div class="panel">
            <h2 class="panelTitle">Description</h2>
            <p id="description" class="descriptionText"></p>
          </div>
        </div>

        <div class="panel evolutionsPanel">
          <h2 class="panelTitle">Évolutions</h2>
          <ul id="evolutions" class="evolutionsList"></ul>
        </div>
      </section>
    </main>
